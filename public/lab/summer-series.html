<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../index.css">
  <title>summer series 2026</title>
  <link rel="icon" href="../images/logo.png" type="image/icon type">
</head>

<!-- Google tag (gtag.js) -->

<body class="lab-page lab-log summer-series">
  <div class="container">
    <p style="margin-bottom: 6px;">
      <a href="index.html">back</a> ·
      <a target="_blank" rel="noopener noreferrer" href="https://www.youtube.com/@pj.k1m">yt channel</a> ·
      <a href="inspo.html">my inspo</a>
    </p>

    <h1>summer series 2026</h1>

    <section class="summer-spec" aria-label="series cadence">
      <div class="summer-spec-row">
        <span class="summer-spec-k">run</span>
        <span class="summer-spec-v">apr 27 – aug 23, 2026</span>
      </div>
      <div class="summer-spec-row">
        <span class="summer-spec-k">cadence</span>
        <span class="summer-spec-v">~2 posts/week — creative reels + vlogs, days flex</span>
      </div>
    </section>
    <!-- posts: edit WEEKS in the script below -->

    <div id="summer-weeks" class="dsa-list"></div>

    <p id="summer-stats" class="dsa-muted dsa-stats" style="margin-top: 8px;"></p>
  </div>

  <script>
    (function () {
      /**
       * WEEKS[] = { range, start, posts? }
       * posts[] = { type, date?, links? }
       * date: display label, e.g. "apr 29"
       * links: string url, { url, label }, or array of those
       */
      const WEEKS = [
        {
          range: "apr 27 – may 3",
          start: "2026-04-27",
          posts: [
            {
              type: "creative reel",
              date: "apr 29",
              links: [
                { url: "https://www.instagram.com/p/DXuEYcaBPmY/", label: "instagram" },
                { url: "https://www.tiktok.com/@pj.k1m/video/7635004506035539214", label: "tiktok" },
              ],
            },
            {
              type: "vlog",
              date: "may 2",
              links: [
                { url: "https://www.youtube.com/watch?v=rSWE8zTIuQw&t=32s", label: "youtube" },
              ],
            },
          ],
        },
        {
          range: "may 4–10",
          start: "2026-05-04",
          posts: [
            {
              type: "creative reel",
              date: "may 4",
              links: [
                { url: "https://www.instagram.com/p/DX5JeBWoI28/", label: "instagram" },
                { url: "https://youtu.be/14UWJ3bIiNs", label: "youtube" },
                { url: "https://www.tiktok.com/@pj.k1m/video/7635808820257623310", label: "tiktok" },
              ],
            },
            {
              type: "creative reel",
              date: "may 7",
              links: [
                { url: "https://www.instagram.com/reel/DYDCGRIoORF/", label: "instagram" },
                { url: "https://www.tiktok.com/@pj.k1m/video/7637218915969535246", label: "tiktok" },
              ],
            },
          ],
        },
        {
          range: "may 11–17",
          start: "2026-05-11",
          posts: [
            {
              type: "creative reel",
              date: "may 11",
              links: [
                { url: "https://www.instagram.com/p/DYKqvQtIhSW/", label: "instagram" },
                { url: "https://www.tiktok.com/@pj.k1m/video/7638332544320146702", label: "tiktok" },
                { url: "https://www.youtube.com/watch?v=LgRWfT1wBRM", label: "youtube" },
              ],
            },
            {
              type: "creative reel",
              date: "may 16",
              links: [
                { url: "https://www.tiktok.com/@pj.k1m/video/7640176389429202190", label: "tiktok" },
                { url: "https://www.instagram.com/p/DYXfyIkIIZN/", label: "instagram" },
              ],
            },
          ],
        },
        { range: "may 18–24", start: "2026-05-18" },
        { range: "may 25–31", start: "2026-05-25" },
        { range: "jun 1–7", start: "2026-06-01" },
        { range: "jun 8–14", start: "2026-06-08" },
        { range: "jun 15–21", start: "2026-06-15" },
        { range: "jun 22–28", start: "2026-06-22" },
        { range: "jun 29–jul 5", start: "2026-06-29" },
        { range: "jul 6–12", start: "2026-07-06" },
        { range: "jul 13–19", start: "2026-07-13" },
        { range: "jul 20–26", start: "2026-07-20" },
        { range: "jul 27–aug 2", start: "2026-07-27" },
        { range: "aug 3–9", start: "2026-08-03" },
        { range: "aug 10–16", start: "2026-08-10" },
        { range: "aug 17–23", start: "2026-08-17" },
      ];

      function localYmd(d) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return y + "-" + m + "-" + day;
      }

      function addDaysYmd(ymd, delta) {
        const p = ymd.split("-").map(Number);
        const dt = new Date(p[0], p[1] - 1, p[2] + delta);
        return localYmd(dt);
      }

      const todayStr = localYmd(new Date());

      function normalizeLinkEntry(entry) {
        if (entry == null || entry === "") return [];
        if (typeof entry === "string") return [{ url: entry, label: "watch" }];
        if (Array.isArray(entry)) return entry.flatMap(normalizeLinkEntry);
        if (typeof entry === "object" && entry.url) {
          return [{ url: entry.url, label: entry.label || "watch" }];
        }
        return [];
      }

      function countPosted() {
        let vlogs = 0;
        let reels = 0;
        for (const week of WEEKS) {
          for (const post of week.posts || []) {
            if (post.type === "vlog") vlogs++;
            else if (post.type === "creative reel") reels++;
          }
        }
        return { vlogs, reels, total: vlogs + reels };
      }

      function renderStats() {
        const el = document.getElementById("summer-stats");
        if (!el) return;
        const { vlogs, reels, total } = countPosted();
        const vlogLabel = vlogs === 1 ? "vlog" : "vlogs";
        const reelLabel = reels === 1 ? "creative reel" : "creative reels";
        el.textContent =
          vlogs + " " + vlogLabel + " · " + reels + " " + reelLabel + " · " + total + " total";
      }

      function appendPostRow(ul, typeLabel, dateLabel, links) {
        const li = document.createElement("li");
        li.className = "summer-slot";

        const what = document.createElement("span");
        what.className = "summer-slot-what";
        if (dateLabel) {
          const dateEl = document.createElement("span");
          dateEl.className = "summer-date";
          dateEl.textContent = dateLabel;
          what.appendChild(dateEl);
          what.appendChild(document.createTextNode(" "));
        }
        const typeEl = document.createElement("span");
        typeEl.className = "summer-type";
        typeEl.textContent = typeLabel;
        what.appendChild(typeEl);

        const linkCell = document.createElement("span");
        linkCell.className = "summer-slot-link";
        if (!links.length) {
          const s = document.createElement("span");
          s.className = "dsa-muted";
          s.textContent = "tba";
          linkCell.appendChild(s);
        } else {
          links.forEach((L, i) => {
            if (i) linkCell.appendChild(document.createTextNode(" · "));
            const a = document.createElement("a");
            a.href = L.url;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            a.textContent = L.label;
            linkCell.appendChild(a);
          });
        }

        li.appendChild(what);
        li.appendChild(linkCell);
        ul.appendChild(li);
      }

      const root = document.getElementById("summer-weeks");
      if (!root) return;

      let currentWeekIdx = -1;
      for (let i = 0; i < WEEKS.length; i++) {
        const end = addDaysYmd(WEEKS[i].start, 6);
        if (todayStr >= WEEKS[i].start && todayStr <= end) {
          currentWeekIdx = i;
          break;
        }
      }

      const frag = document.createDocumentFragment();
      for (let i = 0; i < WEEKS.length; i++) {
        const week = WEEKS[i];
        const posts = week.posts || [];

        const day = document.createElement("div");
        day.className = "dsa-day";
        if (i === currentWeekIdx) {
          day.classList.add("summer-week-current");
          day.setAttribute("aria-current", "true");
        }

        const title = document.createElement("div");
        title.className = "dsa-day-title";
        title.textContent = "week " + (i + 1) + " · " + week.range;
        day.appendChild(title);

        const ul = document.createElement("ul");
        ul.className = "dsa-items";

        if (!posts.length) {
          const li = document.createElement("li");
          li.className = "dsa-muted";
          li.textContent = "tba";
          ul.appendChild(li);
        } else {
          posts.forEach((post) => {
            appendPostRow(ul, post.type, post.date || "", normalizeLinkEntry(post.links));
          });
        }

        day.appendChild(ul);
        frag.appendChild(day);
      }
      root.appendChild(frag);
      renderStats();
    })();
  </script>

  <script defer src="../js/theme.js"></script>
</body>
</html>
