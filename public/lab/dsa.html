<body class="lab-page lab-log">

    <h1>dsa</h1>
    <p style="margin-top: 0;">
      study log from github commits.
      <a href="https://github.com/PJ1229/leetcode.git" target="_blank" rel="noopener noreferrer">repo →</a>
    </p>

    <div class="dsa-list" id="dsa-list">
      <p class="dsa-muted">Loading progress…</p>
    </div>
  </div>

  <script>
    (function () {
      const container = document.getElementById("dsa-list");
      if (!container) return;

      const repo = "PJ1229/leetcode";
      const url = `https://api.github.com/repos/${repo}/commits?per_page=100`;

      function formatDate(iso) {
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return iso;
        return d.toLocaleDateString("en-US", {
          month: "short",
          day: "numeric",
          year: "numeric"
        });
      }

      function getLocalDayKey(iso) {
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return "unknown";

        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");

        return `${year}-${month}-${day}`;
      }

      function groupByDay(commits) {
        const map = new Map();

        commits.forEach((item) => {
          const date = item.commit && item.commit.author && item.commit.author.date;
          const day = date ? getLocalDayKey(date) : "unknown";

          if (!map.has(day)) map.set(day, []);
          map.get(day).push({
            message: item.commit && item.commit.message ? item.commit.message : "Untitled commit",
            url: item.html_url,
            date: date || ""
          });
        });

        return Array.from(map.entries())
          .sort((a, b) => b[0].localeCompare(a[0]));
      }

      function computeProgress(commits, groups) {
        const dayKeys = groups.map(([day]) => day).filter((d) => d !== "unknown");
        return {
          problems: commits.length,
          studyDays: dayKeys.length
        };
      }

      fetch(url)
        .then((res) => (res.ok ? res.json() : Promise.reject(res)))
        .then((data) => {
          if (!Array.isArray(data) || !data.length) {
            container.innerHTML = '<p class="dsa-muted">No logs yet.</p>';
            return;
          }

          const groups = groupByDay(data);
          const progress = computeProgress(data, groups);
          container.innerHTML = "";

          const stats = document.createElement("p");
          stats.className = "dsa-muted dsa-stats";
          stats.textContent =
            `${progress.problems} problem${progress.problems === 1 ? "" : "s"}` +
            ` · ${progress.studyDays} study day${progress.studyDays === 1 ? "" : "s"}`;
          container.appendChild(stats);

          groups.forEach(([day, items]) => {
            const section = document.createElement("div");
            section.className = "dsa-day";

            const title = document.createElement("div");
            title.className = "dsa-day-title";
            title.textContent = formatDate(items[0].date || day);

            const list = document.createElement("ul");
            list.className = "dsa-items";

            items.forEach((item) => {
              const li = document.createElement("li");
              const link = document.createElement("a");
              link.href = item.url;
              link.target = "_blank";
              link.rel = "noopener noreferrer";
              link.textContent = item.message.split("\n")[0];
              li.appendChild(link);
              list.appendChild(li);
            });

            section.appendChild(title);
            section.appendChild(list);
            container.appendChild(section);
          });
        })
        .catch(() => {
          container.innerHTML = '<p class="dsa-muted">Could not load logs yet.</p>';
        });
    })();
  </script>

  <script defer src="../js/theme.js"></script>
</body>
</html>
